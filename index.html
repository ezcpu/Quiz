<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planet Fitness Trivia Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-6 font-sans select-none">

    <!-- Header Section -->
    <header class="text-center py-4">
        <h1 class="text-3xl font-black tracking-tight text-purple-400 uppercase">Giveaway Challenge</h1>
        <p class="text-slate-400 text-sm mt-1 font-medium tracking-wide uppercase">Test Your Fitness Knowledge</p>
    </header>

    <!-- Main Dynamic Container -->
    <main class="flex-grow flex flex-col justify-center max-w-xl w-full mx-auto my-4">
        <div id="quiz-card" class="bg-slate-800 border border-slate-700/50 rounded-2xl p-6 shadow-xl transition-all duration-300">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    <!-- Footer Status -->
    <footer class="text-center text-xs text-slate-500 font-mono py-2">
        Kiosk Mode Active • Tap to Reset
    </footer>

    <script>
        // Master Question Pool (5 Planet Fitness & General Fitness Questions)
        const questionPool = [
            {
                question: "If you have a PF Black Card, what is one benefit is truely unlimited?",
                options: ["Unlimited Tanning", "Free Drinks", "Access to one location", "Access 24/7"],
                correct: "Unlmited Tanning"
            },
            {
                question: "What is the name of the premium membership tier that offers additional perks like guest access and use of any club?",
                options: ["Classic Membership", "Gold Status", "Elite", "PF Black Card"],
                correct: "PF Black Card"
            },
            {
                question: "What feature on the free Planet Fitness mobile app allows local members to check how busy the Langley club is before driving over?"
                options: ["The Traffic Tracker", "The Crowd Meter", "The Gym Radar", "The Capacity Counter"],
                correct: "The Crowd Meter"
            },
            {
                question: "What is the name of Planet Fitness's famous philosophy that promotes a comfortable, welcoming environment?",
                options: ["No Pain No Gain Zone", "Hardcore Elite Space", "Judgement Free Zone®", "Peak Performance Club"],
                correct: "Judgement Free Zone®"
            },
            {
                question: "If you are a Planet Fitness member how much do classes costs?",
                options: ["$50", "$0 Free for both membership options", "$100", "$10"],
                correct: "$0 Free for both membership options"
            },
            {
                question: "Which iconic device is located on the wall in Planet Fitness clubs to deter loud grunting, weight slamming, or disruptive behavior?",
                options: ["The Siren Alert", "The Lunk Alarm®", "The Focus Bell", "The Gym Whistle"],
                correct: "The Lunk Alarm®"
            },
            {
                question: "What street is the local Langley Planet Fitness club located on?",
                options: ["Fraser Hwy", "204th Street", "64th Avenue", "Langley Bypass"],
                correct: "204th Street"
            }
        ];

        let currentQuestion = null;
        let hasAnswered = false;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            hasAnswered = false;
            // Pick a completely random question from the pool
            const randomIndex = Math.floor(Math.random() * questionPool.length);
            currentQuestion = { ...questionPool[randomIndex] };
            
            // Shuffle the options so the correct answer isn't always in the same spot
            currentQuestion.options = shuffleArray([...currentQuestion.options]);

            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('quiz-card');
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="text-xs font-bold text-purple-400 uppercase tracking-wider">Random Trivia Challenge</div>
                    <h2 class="text-xl font-bold leading-snug text-slate-100">${currentQuestion.question}</h2>
                    <div class="space-y-3 pt-2" id="options-group">
                        ${currentQuestion.options.map((option, index) => `
                            <button onclick="handleSelection('${option.replace(/'/g, "\\'")}', this)" 
                                    class="w-full text-left p-4 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700/50 active:scale-[0.99] font-medium transition-all flex items-center justify-between group">
                                <span>${option}</span>
                                <span class="w-5 h-5 rounded-full border border-slate-600 flex items-center justify-center text-xs font-bold group-hover:border-purple-400"></span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleSelection(selectedOption, buttonElement) {
            if (hasAnswered) return;
            hasAnswered = true;

            const isCorrect = selectedOption === currentQuestion.correct;
            const optionsGroup = document.getElementById('options-group');
            const buttons = optionsGroup.getElementsByTagName('button');

            // Apply styling updates instantly
            for (let btn of buttons) {
                btn.disabled = true;
                const btnText = btn.innerText.trim();
                
                if (btnText === currentQuestion.correct) {
                    btn.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-950/40 text-emerald-300 font-semibold transition-all flex items-center justify-between";
                    btn.innerHTML += `<span class="text-emerald-400 font-bold">✓ Correct</span>`;
                } else if (btnText === selectedOption && !isCorrect) {
                    btn.className = "w-full text-left p-4 rounded-xl border-2 border-rose-500 bg-rose-950/40 text-rose-300 font-medium transition-all flex items-center justify-between";
                    btn.innerHTML += `<span class="text-rose-400 font-bold">✗ Incorrect</span>`;
                } else {
                    btn.className = "w-full text-left p-4 rounded-xl border border-slate-800 bg-slate-900/30 text-slate-500 transition-all flex items-center justify-between";
                }
            }

            // Display feedback block and reset mechanic below the question
            const container = document.getElementById('quiz-card');
            const resultBlock = document.createElement('div');
            resultBlock.className = "mt-6 pt-6 border-t border-slate-700/60 text-center animate-fade-in";
            
            resultBlock.innerHTML = `
                <div class="text-lg font-bold ${isCorrect ? 'text-emerald-400' : 'text-rose-400'}">
                    ${isCorrect ? '🎉 Clean Win! Next person\'s turn.' : '❌ Out of Luck! Better luck next time.'}
                </div>
                <button onclick="initQuiz()" class="mt-4 w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg active:scale-95 text-md uppercase tracking-wider">
                    Next Player
                </button>
            `;
            container.appendChild(resultBlock);
        }

        // Initialize on page load
        window.onload = initQuiz;
    </script>
</body>
</html>
